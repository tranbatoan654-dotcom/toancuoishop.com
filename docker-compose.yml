version: '3.8'

services:
  app:
    build: .
    container_name: inventory-app
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/inventory_db
      - SESSION_SECRET=your-secret-key-change-this-in-production
      - PORT=3000
      - RENEWAL_FEE=70000
      - RENEWAL_DAYS=30
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: inventory-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
